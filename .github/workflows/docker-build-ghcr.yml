name: Build and push image to GHCR

on:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/ISSUE_TEMPLATE/**"
      - "LICENSE"
      - "NOTICE"
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional extra tag suffix (e.g. test1)"
        required: false
        type: string

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build amd64 and push to ghcr.io
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve VERSION
        id: version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION)
          else
            VERSION="dev"
          fi
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Building VERSION=${VERSION} SHA=${SHORT_SHA}"

      - name: Lowercase image name
        id: image
        run: |
          LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${LOWER}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          BASE="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}"
          TAGS="${BASE}:latest"
          TAGS="${TAGS}
          ${BASE}:sha-${{ steps.version.outputs.short_sha }}"
          if [ -n "${{ github.event.inputs.tag_suffix }}" ]; then
            TAGS="${TAGS}
          ${BASE}:${{ github.event.inputs.tag_suffix }}"
          fi
          {
            echo 'list<<EOF'
            echo "$TAGS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Summary
        run: |
          {
            echo "### Image pushed"
            echo ""
            echo '```'
            echo "${{ steps.tags.outputs.list }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
